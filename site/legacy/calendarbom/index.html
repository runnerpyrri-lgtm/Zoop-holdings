<!-- 캘린더봄 기존 설치·북마크 사용자를 데이터 손실 없이 새 독립 주소로 안내하는 이전 화면이다. -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="robots" content="noindex,follow" />
  <meta name="theme-color" content="#fffaf2" />
  <title>캘린더봄 새 주소로 이동합니다</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fffaf2;color:#2b2144;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;padding:24px}.card{width:min(100%,560px);border:1px solid #e3dbee;border-radius:30px;background:#fff;padding:clamp(28px,7vw,48px);box-shadow:0 18px 50px rgba(43,33,68,.09)}.mark{display:inline-grid;width:56px;height:56px;place-items:center;border-radius:18px;background:#eee9ff;color:#7454c8;font-size:28px;font-weight:900}h1{margin:22px 0 14px;font-size:clamp(32px,8vw,48px);line-height:1.12;letter-spacing:-.05em}p{margin:0;color:#706980;font-size:17px;line-height:1.7}.safe{margin:18px 0;border-left:4px solid #7454c8;border-radius:0 14px 14px 0;background:#f6f2ff;padding:14px 16px;color:#4b4160;font-weight:700}a{display:flex;min-height:54px;align-items:center;justify-content:center;margin-top:22px;border-radius:16px;background:#7454c8;color:#fff;font-size:17px;font-weight:900;text-decoration:none}small{display:block;margin-top:14px;color:#706980;line-height:1.5}
  </style>
</head>
<body data-build-sha="__BUILD_SHA__">
  <main class="card">
    <span class="mark" aria-hidden="true">봄</span>
    <h1>캘린더봄이<br />독립 주소로 이사했어요.</h1>
    <p>더 안정적으로 업데이트하고 다른 로봄 앱과 독립적으로 복구할 수 있도록 새 공식 주소에서 운영합니다.</p>
    <p class="safe">저장한 가족 일정과 설정은 같은 기기에 그대로 남아 있습니다. 이 화면은 데이터를 읽거나 지우지 않습니다.</p>
    <a id="continueLink" href="https://robom-labs.github.io/calendarbom/">새 캘린더봄 열기</a>
    <small>잠시 뒤 자동으로 이동합니다. 북마크와 홈 화면 앱은 새 주소로 다시 추가해 주세요.</small>
  </main>
  <script>
    const destination = "https://robom-labs.github.io/calendarbom/";
    const move = () => location.replace(destination);
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js", { updateViaCache: "none" }).then((registration) => registration.update()).catch(() => undefined).finally(() => setTimeout(move, 1200));
    } else {
      setTimeout(move, 1200);
    }
    document.getElementById("continueLink").addEventListener("click", () => sessionStorage.setItem("calendarbom:legacy-redirect:v1", "manual"));
  </script>
</body>
</html>
