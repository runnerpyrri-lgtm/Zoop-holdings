<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#070b16">
<title>로봄 본부 · 오피스</title>
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<style>
:root{--mono:ui-monospace,"SF Mono","Roboto Mono",Menlo,monospace}
*{margin:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:linear-gradient(180deg,#f3ecdd,#e9e1cf);font-family:"Pretendard Variable",Pretendard,-apple-system,sans-serif;color:#2a2519}
#game{display:block;cursor:grab;touch-action:none}#game:active{cursor:grabbing}
.hud{position:fixed;left:0;right:0;top:0;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 18px;pointer-events:none;z-index:5}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#f6ecd2,#e9d7a8);display:grid;place-items:center;box-shadow:0 0 18px rgba(53,227,155,.35)}
.logo b{color:#35e39b;font-family:var(--mono);font-size:15px}
.brand .t b{font-family:var(--mono);letter-spacing:.14em;font-size:14px}.brand .t small{display:block;color:#7f93b4;font-size:9.5px}
.mode{font-family:var(--mono);font-size:10px;font-weight:800;letter-spacing:.1em;padding:3px 7px;border-radius:6px;border:1px solid rgba(255,255,255,.16);color:#35e39b}
.mode.warn{color:#ffcf4d}
.kpis{display:flex;gap:8px}
.kpi{min-width:74px;padding:6px 11px;border-radius:11px;background:linear-gradient(180deg,rgba(255,253,246,.92),rgba(247,240,226,.92));border:1px solid rgba(150,120,60,.25);position:relative;backdrop-filter:blur(6px)}
.kpi::before{content:"";position:absolute;left:9px;top:10px;width:6px;height:6px;border-radius:50%;background:var(--c);box-shadow:0 0 9px var(--c)}
.kpi .l{padding-left:12px;font-family:var(--mono);font-size:8.5px;letter-spacing:.12em;color:#7f93b4}.kpi .v{font-family:var(--mono);font-size:18px;font-weight:800;color:var(--c)}
.top-right{display:flex;align-items:center;gap:8px;pointer-events:auto}
.back{display:inline-grid;place-items:center;min-height:44px;padding:0 13px;border-radius:10px;border:1px solid rgba(255,255,255,.16);background:rgba(255,253,246,.95);color:#544d3d;text-decoration:none;font-size:12px;font-weight:800}
.clock{font-family:var(--mono);font-size:12px;color:#a7bad6}
.fit{width:34px;height:34px;border-radius:9px;border:1px solid rgba(150,120,60,.3);background:rgba(255,253,246,.9);color:#755718;font-size:15px;cursor:pointer}
.demo-toggle{min-height:34px;padding:0 11px;border-radius:9px;border:1px solid rgba(53,227,155,.3);background:rgba(53,227,155,.1);color:#8ce8c2;font-size:11px;font-weight:900;cursor:pointer;white-space:nowrap}.demo-toggle[aria-pressed="true"]{background:#35e39b;color:#07140f;border-color:#35e39b}
.meetban{position:fixed;left:50%;top:60px;transform:translateX(-50%);display:none;align-items:center;gap:8px;padding:7px 15px;border-radius:999px;background:rgba(168,121,255,.16);border:1px solid rgba(168,121,255,.4);font-family:var(--mono);font-size:12px;color:#d0bcff;z-index:5;box-shadow:0 8px 24px -8px rgba(168,121,255,.5)}
.meetban i{width:8px;height:8px;border-radius:50%;background:#a879ff;box-shadow:0 0 10px #a879ff;animation:pl 1.4s infinite}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}
.legend{position:fixed;left:18px;bottom:16px;display:flex;gap:14px;flex-wrap:wrap;font-family:var(--mono);font-size:10.5px;color:#8ea3c4;z-index:5;pointer-events:none}
.legend span{display:inline-flex;align-items:center;gap:5px}.legend i{width:9px;height:9px;border-radius:50%}
.floors{position:fixed;left:18px;top:82px;z-index:7;width:270px;padding:12px;border-radius:18px;background:rgba(8,14,26,.91);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(12px);pointer-events:auto}.floor-head{display:grid;gap:3px;padding:0 4px 10px}.floor-head strong{color:#e7effc;font:900 12px/1.2 var(--mono)}.floor-head small{color:#7488a7;font-size:10px}.floor-buttons{display:grid;grid-template-columns:1fr 1fr;gap:6px}.floor-btn{min-width:0;min-height:48px;display:grid;grid-template-columns:28px 1fr;align-items:center;gap:6px;padding:5px 8px;border:1px solid transparent;border-radius:11px;background:rgba(255,255,255,.025);color:#9fb2cf;text-align:left;cursor:pointer}.floor-btn b{color:#dce8fa;font:900 11px/1 var(--mono)}.floor-btn span{font-size:10px;font-weight:700;line-height:1.2}.floor-btn.active{border-color:rgba(53,227,155,.45);background:rgba(53,227,155,.13)}.floor-btn.active b{color:#35e39b}.floor-summary{display:grid;gap:7px;margin-top:10px;padding:12px;border-radius:14px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08)}.floor-summary>span{color:#35e39b;font:800 9px/1.2 var(--mono);letter-spacing:.08em}.floor-summary h2{font-size:16px}.floor-summary p{color:#9cafc8;font-size:11px;line-height:1.5}.floor-summary>small{color:#7185a4;font-size:9px}.floor-teams{display:flex;flex-wrap:wrap;gap:5px}.floor-teams b{padding:4px 6px;border-radius:999px;background:rgba(73,198,229,.1);color:#a7dff0;font-size:9px}.floor-summary dl{display:flex;gap:5px}.floor-summary dl div{flex:1;min-width:0;padding:6px;border-radius:9px;background:rgba(0,0,0,.18)}.floor-summary dt{color:#7185a4;font-size:8px}.floor-summary dd{margin-top:2px;color:#eef5ff;font:800 11px/1.2 var(--mono)}
.detail{position:fixed;right:14px;top:76px;bottom:14px;width:min(340px,calc(100vw - 28px));z-index:8;padding:20px;overflow:auto;transform:translateX(calc(100% + 28px));transition:transform .28s ease;background:linear-gradient(180deg,rgba(18,29,50,.97),rgba(7,12,24,.97));border:1px solid rgba(255,255,255,.14);border-radius:18px;box-shadow:0 24px 80px rgba(0,0,0,.45);backdrop-filter:blur(14px)}
.detail.open{transform:translateX(0)}.detail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}.detail h2{font-size:21px;line-height:1.2}.detail-role{margin-top:6px;color:#8fa5c7;font-size:12px}.detail-close{width:36px;height:36px;border:1px solid rgba(255,255,255,.14);border-radius:10px;background:#111d31;color:#dbe7fb;font-size:20px;cursor:pointer}.detail-state{margin:20px 0 14px;padding:11px 12px;border-radius:11px;background:rgba(53,227,155,.08);border:1px solid rgba(53,227,155,.2);color:#9cebc9;font-size:12px;font-weight:700}.detail dl{display:grid;grid-template-columns:72px minmax(0,1fr);gap:9px 12px;padding:14px 0;border-top:1px solid rgba(255,255,255,.08);border-bottom:1px solid rgba(255,255,255,.08);font-size:12px}.detail dt{color:#7389a9}.detail dd{margin:0;color:#e9f1ff;overflow-wrap:anywhere}.detail h3{margin:18px 0 9px;font-size:12px;letter-spacing:.08em;color:#9bb0ce}.detail ul{display:grid;gap:8px;list-style:none;padding:0}.detail li{display:grid;gap:3px;padding:9px 10px;border-radius:10px;background:rgba(255,255,255,.045);font-size:11px}.detail li b{color:#a879ff}.detail li span,.empty{color:#7f93b4}.toasts{position:fixed;right:16px;top:76px;z-index:12;display:grid;gap:8px;pointer-events:none}.toast{max-width:320px;padding:11px 14px;border-radius:12px;background:rgba(15,25,43,.96);border:1px solid rgba(255,255,255,.14);box-shadow:0 14px 38px rgba(0,0,0,.35);font:700 12px/1.4 Pretendard,sans-serif;opacity:0;transform:translateY(-8px);transition:.22s}.toast.show{opacity:1;transform:none}.sr-only{position:absolute!important;width:1px!important;height:1px!important;padding:0!important;margin:-1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important;border:0!important}
@media(max-width:720px){.hud{align-items:flex-start;padding:9px 10px}.brand .t small{display:none}.logo{width:34px;height:34px}.back,.fit,.demo-toggle{min-height:48px}.back{display:none}.demo-toggle{padding:0 9px;font-size:10px}.fit{width:48px}.kpis{position:fixed;top:58px;left:8px;right:8px;justify-content:center}.kpi{min-width:0;flex:1;max-width:92px;padding:5px 7px}.kpi .l{font-size:7px}.kpi .v{font-size:15px}.clock{display:none}.floors{left:8px;right:8px;top:108px;width:auto;padding:6px}.floor-head{display:none}.floor-buttons{display:flex;overflow-x:auto;gap:5px;scrollbar-width:none}.floor-buttons::-webkit-scrollbar{display:none}.floor-btn{flex:0 0 82px;min-height:48px;grid-template-columns:1fr;text-align:center;padding:4px 7px}.floor-btn b{font-size:11px}.floor-btn span{font-size:9px}.floor-btn.active{border-color:rgba(53,227,155,.45);background:rgba(53,227,155,.13)}.floor-btn.active b{color:#35e39b}.floor-summary{grid-template-columns:1fr auto;margin-top:6px;padding:8px 10px;gap:2px 8px}.floor-summary>span{grid-column:1/-1}.floor-summary h2{font-size:13px}.floor-summary p,.floor-teams,.floor-summary>small{display:none}.floor-summary dl{gap:4px}.floor-summary dl div{padding:4px 5px}.floor-summary dt{font-size:7px}.floor-summary dd{font-size:9px}.legend{left:10px;right:10px;bottom:8px;gap:7px;font-size:8px}.legend span:nth-child(n+4){display:none}.detail{top:auto;left:8px;right:8px;bottom:8px;width:auto;max-height:64vh;transform:translateY(calc(100% + 18px));border-radius:18px}.detail.open{transform:translateY(0)}.detail-close{width:48px;height:48px}.toasts{top:248px;left:10px;right:10px}.toast{max-width:none}.meetban{top:244px;font-size:10px}}
@media(prefers-reduced-motion:reduce){.meetban i{animation:none}.detail,.toast{transition:none}}
</style></head><body>
<canvas id="game"></canvas>
<div class="hud">
  <div class="brand"><span class="logo"><b>R</b></span><span class="t"><b>ROBOM HQ</b><small>로봄 본부 · 실시간 오피스</small></span></div>
  <div class="kpis">
    <div class="kpi" style="--c:#35e39b"><div class="l">일하는중</div><div class="v" id="k-work">0</div></div>
    <div class="kpi" style="--c:#a879ff"><div class="l">회의중</div><div class="v" id="k-meet">0</div></div>
    <div class="kpi" style="--c:#d7a957"><div class="l">방문 연출</div><div class="v" id="k-visitor">0</div></div>
    <div class="kpi" style="--c:#ff5d6c"><div class="l">막힘</div><div class="v" id="k-block">0</div></div>
  </div>
  <div class="top-right"><a class="back" href="./index.html">경영 OS</a><button class="demo-toggle" id="demoBtn" type="button" aria-pressed="false">전원 업무 시연</button><span class="clock" id="clock">--:--:--</span><span class="mode" id="mode">AUTO</span><button class="fit" id="fitBtn" title="전체 보기">⤢</button></div>
</div>
<nav class="floors" id="floorNav" aria-label="오피스 층 선택"><strong>층별 오피스</strong></nav>
<div class="meetban" id="meetban"><i></i><span id="meettopic">회의 중</span></div>
<div class="newsbar" aria-live="polite"><b>ROBOM 사내 소식</b><span id="ticker">회사 상태를 불러오는 중입니다</span></div>
<style>.newsbar{position:fixed;left:0;right:0;bottom:0;z-index:6;display:flex;align-items:center;gap:12px;padding:9px 16px;background:linear-gradient(180deg,rgba(255,253,246,.96),rgba(244,234,208,.96));border-top:1px solid rgba(150,120,60,.3);font-size:12.5px;color:#544d3d;box-shadow:0 -4px 18px rgba(90,70,30,.08)}.newsbar b{flex:0 0 auto;font-family:"Nanum Myeongjo",serif;font-size:12px;letter-spacing:2px;color:#8f6d22}.newsbar span{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}@media(max-width:720px){.newsbar b{display:none}}</style>
<div class="legend">
  <span><i style="background:#35e39b"></i>일하는 중</span><span><i style="background:#a879ff"></i>회의</span>
  <span><i style="background:#d7a957"></i>방문 연출</span><span><i style="background:#ff5d6c"></i>확인 필요</span>
  <span style="color:#5f7391">· 클릭=상세/방 확대 · 드래그=이동 · 휠/핀치=확대</span>
</div>
<aside class="detail" id="detailPanel" aria-label="직원과 공간 상세" aria-hidden="true">
  <div class="detail-head"><div><h2 id="detailName">직원</h2><p class="detail-role" id="detailRole">상태</p></div><button class="detail-close" id="detailClose" type="button" aria-label="상세 패널 닫기">×</button></div>
  <p class="detail-state" id="detailState">실시간 작업 없음 · 오토파일럿</p>
  <dl id="detailMeta"></dl><h3>최근 실시간 이벤트</h3><ul id="detailEvents"></ul>
</aside>
<div class="toasts" id="toasts" aria-hidden="true"></div><div class="sr-only" id="ariaLive" aria-live="polite"></div>
<script src="./office.js"></script>
</body></html>
