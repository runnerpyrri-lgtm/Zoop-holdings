# 로봄 앱 포트폴리오 단일 소스.
# 앱 코드는 각 원본 저장소에서만 관리하며 robom에는 복사하지 않는다.

apps:
  - id: outbom
    name: 야외봄
    english_name: OutBom
    legacy_id: runningcall
    status: live
    version: 0.24.0
    version_source: https://raw.githubusercontent.com/robom-labs/outbom/main/package.json
    healthcheck_url: https://robom-labs.github.io/outbom/
    privacy_url: https://robom.kr/privacy/outbom
    support_url: https://robom.kr/support
    mobile_status: planned
    repo: robom-labs/outbom
    legacy_repo: runnerpyrri-lgtm/runningcall
    stack: Next.js 16 + React 19 (pnpm)
    test: "pnpm typecheck && pnpm test"
    build: "pnpm build"
    deploy: github-pages
    base_path: /outbom/
    current_url: https://robom-labs.github.io/outbom/
    url: https://robom-labs.github.io/outbom/
    api_url: https://outbom.robom.kr
    legacy_url: https://runningcall.vercel.app
    marketing_tone: "날씨와 대기질로 야외활동하기 좋은 시간을 알려주는 앱"

  - id: homebom
    name: 청약봄
    english_name: HomeBom
    legacy_id: zoopzoopcall
    status: live
    version: 0.12.0
    version_source: https://raw.githubusercontent.com/robom-labs/homebom/main/apps/web/package.json
    healthcheck_url: https://robom-labs.github.io/homebom/
    privacy_url: https://robom.kr/privacy/homebom
    support_url: https://robom.kr/support
    mobile_status: planned
    repo: robom-labs/homebom
    legacy_repo: runnerpyrri-lgtm/zoopzoopcall
    stack: pnpm + Vite + React PWA
    test: "pnpm typecheck && pnpm test"
    build: "pnpm build"
    deploy: github-pages
    base_path: /homebom/
    current_url: https://robom-labs.github.io/homebom/
    legacy_url: https://runnerpyrri-lgtm.github.io/zoopzoopcall/
    marketing_tone: "일반공급과 무순위 청약의 접수·발표·계약 일정을 한눈에 챙기는 앱"

  - id: runningbom
    name: 러닝봄
    english_name: RunningBom
    legacy_id: pushrun
    status: live
    version: 0.16.0
    version_source: https://raw.githubusercontent.com/robom-labs/runningbom/main/package.json
    healthcheck_url: https://robom-labs.github.io/runningbom/
    privacy_url: https://robom.kr/privacy/runningbom
    support_url: https://robom.kr/support
    mobile_status: planned
    repo: robom-labs/runningbom
    legacy_repo: runnerpyrri-lgtm/pushrun
    stack: static PWA (HTML/CSS/JS)
    test: "npm test"
    build: "none"
    deploy: github-pages + vercel
    current_url: https://robom-labs.github.io/runningbom/
    legacy_url: https://runnerpyrri-lgtm.github.io/pushrun/
    marketing_tone: "러닝 대회 탐색과 접수 시작 시간을 알려주는 앱"

  - id: calendarbom
    name: 캘린더봄
    english_name: CalendarBom
    status: live
    version: 0.3.0
    version_source: https://raw.githubusercontent.com/robom-labs/robom/main/apps/calendarbom/package.json
    healthcheck_url: https://robom-labs.github.io/robom/calendarbom/
    privacy_url: https://robom.kr/privacy/calendarbom
    support_url: https://robom.kr/support
    mobile_status: planned
    # 임시: robom-labs/calendarbom 저장소 생성 권한이 없어 본사 저장소에 소스를 보관하고
    # 본사 Pages 아티팩트에 /calendarbom/ 로 함께 배포한다. 이전 절차는 ops/HUMAN_ACTIONS.md 참고.
    repo: robom-labs/robom (apps/calendarbom, 임시)
    target_repo: robom-labs/calendarbom
    stack: static PWA (HTML/CSS/JS)
    test: "npm test"
    build: "none"
    deploy: github-pages (본사 사이트 아티팩트에 포함, 임시)
    base_path: /robom/calendarbom/
    current_url: https://robom-labs.github.io/robom/calendarbom/
    url: https://robom-labs.github.io/robom/calendarbom/
    target_url: https://robom-labs.github.io/calendarbom/
    marketing_tone: "큰 달력에서 날짜를 누르고 버튼만으로 일정과 알람을 저장하는 우리 가족 달력 앱"
