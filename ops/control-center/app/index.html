<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#080b12" />
    <meta name="color-scheme" content="dark" />
    <title>ROBOM HQ · 로봄 본부</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="hq" id="hq">
      <header class="statusbar">
        <button class="sb-icon menu-btn" id="menuBtn" type="button" aria-label="메뉴 열기"></button>
        <div class="sb-brand">
          <span class="sb-logo"><img src="./icon.svg" alt="" width="20" height="20" /></span>
          <span><b>ROBOM HQ</b><small>로봄 본부</small></span>
        </div>
        <div class="sb-center">
          <div class="codex-pill" id="codexPill" role="button" tabindex="0" aria-label="Codex 상태">
            <span class="cx-dot"></span>
            <span class="cx-body">
              <span class="cx-label">CODEX · <b id="cxState">확인 중</b></span>
              <span class="cx-detail" id="cxDetail">연결 상태를 불러오는 중</span>
            </span>
          </div>
          <div class="app-signals" id="appSignals" aria-label="앱 상태 신호등"></div>
        </div>
        <div class="sb-right">
          <span class="sb-clock" id="clock">--:--:--</span>
          <span class="mode-badge" id="modeBadge">연결 확인 중</span>
          <button class="sb-icon" id="refreshBtn" type="button" aria-label="새로고침"></button>
        </div>
      </header>

      <nav class="rail" id="rail" aria-label="주 메뉴"></nav>

      <main id="screen" class="screen" tabindex="-1" aria-live="polite">
        <div class="loading"><span></span><b>회사 상태를 불러오는 중입니다.</b></div>
      </main>

      <nav class="tabbar" id="tabbar" aria-label="모바일 주요 메뉴"></nav>
    </div>

    <dialog class="modal" id="taskDialog" aria-labelledby="taskDialogTitle">
      <form method="dialog" id="taskForm">
        <div class="modal-head">
          <div><small>새 수정 요청</small><h2 id="taskDialogTitle">무엇을 고칠까요?</h2></div>
          <button class="icon-close" type="button" data-dialog-close="taskDialog" aria-label="닫기"></button>
        </div>
        <label>어느 앱인가요?<select name="appId" id="taskApp" required></select></label>
        <label>한 줄로 요약하면?<input name="title" id="taskTitle" required maxlength="120" placeholder="예: 접수 버튼 글자가 안 보여요" /></label>
        <label>사진·스크린샷 첨부 <small>(선택 — 붙여넣기·드래그·클릭)</small>
          <div class="dropzone" id="taskDrop" tabindex="0">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="1.6"/><path d="M21 15l-5-5L5 21"/></svg>
            <b>여기에 이미지를 붙여넣기(<kbd>⌘V</kbd>)·드래그하거나 클릭</b>
            <span>화면 캡처를 그대로 붙여넣어도 돼요</span>
          </div>
          <input type="file" id="taskFile" accept="image/*" multiple hidden />
          <div class="thumbs" id="taskThumbs"></div>
        </label>
        <details>
          <summary>자세히 적기 (선택 — 더 정확히 고쳐요)</summary>
          <div class="det-body">
            <label>무엇이 불편한가요?<textarea name="problem" id="taskProblem" rows="3" maxlength="2000" placeholder="어디서, 어떤 상황에서 불편한지 말하듯 적어 주세요."></textarea></label>
            <label>어떻게 되면 만족하나요?<textarea name="desiredOutcome" id="taskOutcome" rows="2" maxlength="2000" placeholder="예: 버튼 글자가 흰색으로 또렷하게 보이면 좋겠어요."></textarea></label>
            <label>꼭 유지해야 하는 것은? <small>(비우면 기본 보호 규칙 적용)</small><input name="mustPreserve" id="taskPreserve" maxlength="500" placeholder="예: 지금 저장된 즐겨찾기" /></label>
            <label>어디까지 자동으로 진행할까요?<select name="autonomy"><option value="implement_and_review">고친 뒤 내 확인 대기 (권장)</option><option value="research_only">조사만 하고 보고</option><option value="implement_test_wait_for_deploy">고치고 테스트까지, 배포는 대기</option><option value="guarded_auto_deploy">안전장치 걸고 배포까지 자동</option></select></label>
          </div>
        </details>
        <label>우선순위<select name="priority"><option value="normal">보통</option><option value="high">중요</option><option value="urgent">긴급</option><option value="low">낮음</option></select></label>
        <div class="modal-actions"><button class="button ghost" type="button" data-dialog-close="taskDialog">취소</button><button class="button primary" id="taskSubmit" value="default">등록하고 Codex에 맡기기</button></div>
      </form>
    </dialog>

    <dialog class="modal" id="recordDialog" aria-labelledby="dialogTitle">
      <form method="dialog" id="recordForm">
        <div class="modal-head">
          <div><small id="dialogEyebrow">기록</small><h2 id="dialogTitle">새 기록</h2></div>
          <button class="icon-close" type="button" data-dialog-close="recordDialog" aria-label="닫기"></button>
        </div>
        <input type="hidden" name="collection" id="recordCollection" />
        <label>제목<input name="title" id="recordTitle" required maxlength="120" /></label>
        <label>관련 앱<select name="appId" id="recordApp"><option value="">회사 전체</option></select></label>
        <label>내용<textarea name="body" id="recordBody" rows="5" maxlength="4000" placeholder="확인된 사실과 결정 이유를 적어 주세요."></textarea></label>
        <label>우선순위<select name="priority"><option value="normal">보통</option><option value="high">중요</option><option value="urgent">긴급</option><option value="low">낮음</option></select></label>
        <div class="modal-actions"><button class="button ghost" type="button" data-dialog-close="recordDialog">취소</button><button class="button primary" id="recordSubmit" value="default">저장</button></div>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
