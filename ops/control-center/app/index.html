<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0d14" />
    <meta name="color-scheme" content="dark" />
    <title>ROBOM HQ · 로봄 본부</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="preload" href="./assets/fonts/PretendardVariable.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#screen">본문으로 건너뛰기</a>

    <div class="hq" id="hq">
      <header class="cmdbar" role="banner">
        <div class="cb-brand">
          <span class="cb-logo"><img src="./icon.svg" alt="" width="19" height="19" /></span>
          <span class="cb-brand-txt"><b>ROBOM HQ</b><small>로봄 지주회사 본부</small></span>
          <button class="ver-chip" id="appVersion" type="button" title="설치된 버전 (클릭하면 자세히)">v—</button>
        </div>

        <button class="cb-health" id="cbHealth" type="button" title="전 앱 건강 요약 — 클릭하면 앱 화면으로">
          <i></i><span id="cbHealthText">상태 확인 중</span>
        </button>

        <span class="cb-spacer"></span>

        <button class="codex-pill" id="codexPill" type="button" aria-label="Codex 실행기 상태">
          <span class="cx-dot"></span>
          <span class="cx-body">
            <span class="cx-label">CODEX · <b id="cxState">확인 중</b></span>
            <span class="cx-detail" id="cxDetail">연결 상태를 불러오는 중</span>
          </span>
        </button>

        <div class="app-signals" id="appSignals" aria-label="앱 상태 신호"></div>

        <div class="cb-right">
          <span class="cb-clock" id="clock" aria-hidden="true">--:--:--</span>
          <span class="mode-badge" id="modeBadge">확인 중</span>
          <button class="cb-icon" id="paletteBtn" type="button" title="빠른 이동 (⌘K)" aria-label="명령 팔레트 열기">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          </button>
          <button class="cb-icon" id="refreshBtn" type="button" title="새로고침" aria-label="새로고침">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
          </button>
          <button class="cb-new" id="newTaskBtn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            <span>새 수정 요청</span>
          </button>
        </div>
      </header>

      <nav class="sidenav" id="sidenav" aria-label="주 메뉴"></nav>

      <main id="screen" class="screen" tabindex="-1">
        <div class="loading"><span></span><b>회사 상태를 불러오는 중입니다.</b></div>
      </main>

      <nav class="tabbar" id="tabbar" aria-label="모바일 주요 메뉴"></nav>
    </div>

    <dialog class="modal" id="taskDialog" aria-labelledby="taskDialogTitle">
      <form method="dialog" id="taskForm">
        <div class="modal-head">
          <div><small>새 수정 요청</small><h2 id="taskDialogTitle">무엇을 고칠까요?</h2></div>
          <button class="icon-close" type="button" data-dialog-close="taskDialog" aria-label="닫기">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <label>어느 앱인가요?<select name="appId" id="taskApp" required></select></label>
        <label>한 줄로 요약하면?<input name="title" id="taskTitle" required maxlength="120" placeholder="예: 접수 버튼 글자가 안 보여요" /></label>
        <label>사진·스크린샷 첨부 <small>(선택 — 붙여넣기·드래그·클릭)</small>
          <div class="dropzone" id="taskDrop" tabindex="0" role="button" aria-label="이미지 첨부">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="1.6"/><path d="M21 15l-5-5L5 21"/></svg>
            <b>여기에 이미지를 붙여넣기(<kbd>⌘V</kbd>)·드래그하거나 클릭</b>
            <span>화면 캡처를 그대로 붙여넣어도 돼요</span>
          </div>
          <input type="file" id="taskFile" accept="image/*" multiple hidden />
          <div class="thumbs" id="taskThumbs"></div>
        </label>
        <details>
          <summary>자세히 적기 (선택 — 더 정확히 고쳐요)</summary>
          <div class="det-body">
            <label>무엇이 불편한가요?<textarea name="problem" id="taskProblem" rows="3" maxlength="2000" placeholder="어디서, 어떤 상황에서 불편한지 말하듯 적어 주세요."></textarea></label>
            <label>어떻게 되면 만족하나요?<textarea name="desiredOutcome" id="taskOutcome" rows="2" maxlength="2000" placeholder="예: 버튼 글자가 흰색으로 또렷하게 보이면 좋겠어요."></textarea></label>
            <label>꼭 유지해야 하는 것은? <small>(비우면 기본 보호 규칙 적용)</small><input name="mustPreserve" id="taskPreserve" maxlength="500" placeholder="예: 지금 저장된 즐겨찾기" /></label>
            <label>어디까지 자동으로 진행할까요?<select name="autonomy"><option value="implement_and_review">고친 뒤 내 확인 대기 (권장)</option><option value="research_only">조사만 하고 보고</option><option value="implement_test_wait_for_deploy">고치고 테스트까지, 배포는 대기</option><option value="guarded_auto_deploy">안전장치 걸고 배포까지 자동</option></select></label>
          </div>
        </details>
        <label>우선순위<select name="priority"><option value="normal">보통</option><option value="high">중요</option><option value="urgent">긴급</option><option value="low">낮음</option></select></label>
        <div class="modal-actions"><button class="button ghost" type="button" data-dialog-close="taskDialog">취소</button><button class="button primary" id="taskSubmit" value="default">등록하고 Codex에 맡기기</button></div>
      </form>
    </dialog>

    <dialog class="modal" id="recordDialog" aria-labelledby="dialogTitle">
      <form method="dialog" id="recordForm">
        <div class="modal-head">
          <div><small id="dialogEyebrow">기록</small><h2 id="dialogTitle">새 기록</h2></div>
          <button class="icon-close" type="button" data-dialog-close="recordDialog" aria-label="닫기">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <input type="hidden" name="collection" id="recordCollection" />
        <label>제목<input name="title" id="recordTitle" required maxlength="120" /></label>
        <label>관련 앱<select name="appId" id="recordApp"><option value="">회사 전체</option></select></label>
        <label>내용<textarea name="body" id="recordBody" rows="5" maxlength="4000" placeholder="확인된 사실과 결정 이유를 적어 주세요."></textarea></label>
        <label>우선순위<select name="priority"><option value="normal">보통</option><option value="high">중요</option><option value="urgent">긴급</option><option value="low">낮음</option></select></label>
        <div class="modal-actions"><button class="button ghost" type="button" data-dialog-close="recordDialog">취소</button><button class="button primary" id="recordSubmit" value="default">저장</button></div>
      </form>
    </dialog>

    <dialog class="modal" id="paletteDialog" aria-label="빠른 이동">
      <div class="palette-box">
        <div class="palette-input">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input id="paletteInput" type="text" placeholder="화면·앱·명령 검색…" autocomplete="off" spellcheck="false" />
          <kbd>esc</kbd>
        </div>
        <div class="palette-list" id="paletteList" role="listbox"></div>
      </div>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
