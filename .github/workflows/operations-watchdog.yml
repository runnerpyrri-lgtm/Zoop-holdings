# 로봄 패밀리 운영 화면·PWA·배포 SHA와 자격증봄 source heartbeat를 하루 두 번 감시한다.
name: Family operations watchdog

on:
  schedule:
    - cron: "41 3,15 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: family-operations-watchdog
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - run: node --test ops/scripts/family/operations-watchdog.test.mjs
      - name: 일곱 운영 표면과 source heartbeat 확인
        id: watchdog
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node ops/scripts/family/operations-watchdog.mjs --output operations-watchdog.json
      - name: 실패는 중복 없는 운영 이슈 하나로 승격
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          STATUS="$(jq -r '.status // "FAIL"' operations-watchdog.json 2>/dev/null || echo FAIL)"
          TITLE="[ops] 로봄 패밀리 운영 watchdog 확인 필요"
          EXISTING="$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')"
          if [ "$STATUS" = "PASS" ]; then
            if [ -n "$EXISTING" ]; then
              gh issue close "$EXISTING" --comment "모든 운영 표면과 heartbeat가 정상으로 복구되어 자동으로 닫습니다. 실행: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            fi
            exit 0
          fi
          SUMMARY="$(jq -r '[.apps[] | select(.status == "FAIL") | "\(.id): \((.errors // []) | join("; "))"] | join("\n")' operations-watchdog.json 2>/dev/null || echo "watchdog 결과 파일 확인 필요")"
          BODY="$(printf '실패한 운영 검사입니다.\n\n%s\n\n실행: %s/%s/actions/runs/%s' "$SUMMARY" "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")"
          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "operations" 2>/dev/null || gh issue create --title "$TITLE" --body "$BODY"
          fi
      - name: 운영 실패는 workflow도 실패 처리
        if: steps.watchdog.outcome == 'failure'
        run: exit 1
