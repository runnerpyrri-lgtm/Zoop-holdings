# 안전 레일(범용) — 모든 PR에 항상 실행. 빠르고 스택 무관.
# 앱별 test/build 는 각 ci-<app>.yml 이 '그 앱이 바뀔 때만' 실행한다(path 필터).
name: Guardrails

on:
  pull_request:

permissions:
  contents: read

jobs:
  # 금지선: zoopzoopcall base path 변경 차단
  base-path-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: base path "/zoopzoopcall/" 유지 확인
        run: |
          f="apps/zoopzoopcall/apps/web/vite.config.ts"
          if [ -f "$f" ]; then
            grep -q 'base: *"/zoopzoopcall/"' "$f" \
              || { echo "::error file=$f::base path가 /zoopzoopcall/ 에서 바뀌었다. 배포 URL이 깨진다."; exit 1; }
          fi

  # 장부 정합성: registry에 적힌 앱 폴더가 실제로 존재
  registry-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: apps.yml ↔ apps/ 폴더 일치
        run: |
          test -f ops/registry/apps.yml || { echo "::error::registry 없음"; exit 1; }
          for a in zoopzoopcall runningcall pushrun; do
            test -d "apps/$a" || { echo "::error::apps/$a 폴더 없음(registry와 불일치)"; exit 1; }
          done

  # lockfile 대량 변경 차단
  lockfile-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: lockfile diff 200줄 초과 차단
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          changed=$(git diff --numstat "$base"...HEAD -- '**/pnpm-lock.yaml' | awk '{s+=$1+$2} END{print s+0}')
          echo "lockfile 변경 라인수: $changed"
          if [ "$changed" -gt 200 ]; then
            echo "::error::pnpm-lock.yaml 변경이 200줄을 초과했다. 사람 검토 필요."; exit 1
          fi

  # secret 노출 차단
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
