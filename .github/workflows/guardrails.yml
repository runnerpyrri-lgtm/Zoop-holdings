# 로봄 본사 저장소의 구조·보안·홈페이지 검증.
name: Guardrails

on:
  pull_request:

permissions:
  contents: read

jobs:
  portfolio-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 본사에 앱 소스 사본이 없는지 확인
        run: |
          test ! -d apps || { echo "::error::robom에는 앱 소스 사본을 둘 수 없습니다."; exit 1; }
          test -f ops/registry/apps.yml || { echo "::error::앱 registry가 없습니다."; exit 1; }
          ruby -e 'require "yaml"; data=YAML.load_file("ops/registry/apps.yml"); apps=data.fetch("apps"); abort "앱 3개가 필요합니다" unless apps.size == 3; apps.each { |app| %w[id name repo test build].each { |key| abort "#{app["id"]}: #{key} 누락" unless app.key?(key) }; abort "조직 불일치: #{app["repo"]}" unless app["repo"].start_with?("robom-labs/") }; puts apps.map { |app| "#{app["name"]}=#{app["repo"]}" }.join("\n")'

  site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  version-single-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash ops/scripts/check-version-single-source.sh

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 비밀정보 검사
        uses: docker://ghcr.io/gitleaks/gitleaks:v8.30.1
        with:
          args: git --redact --verbose --no-banner
