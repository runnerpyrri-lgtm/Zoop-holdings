# 로봄 본사 저장소의 구조·보안·홈페이지 검증.
name: Guardrails

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  portfolio-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: 본사에 앱 소스 사본이 없는지 확인
        run: |
          if [ -d apps ]; then
            extra="$(find apps -mindepth 1 -maxdepth 1 -type d)"
            [ -z "$extra" ] || { echo "::error::robom에는 앱 소스 사본을 둘 수 없습니다. 발견: $extra"; exit 1; }
          fi
          test -f ops/registry/apps.yml || { echo "::error::앱 registry가 없습니다."; exit 1; }
          node ops/scripts/check-app-registry.mjs --local
      - name: Company OS와 동적 registry 회귀 검사
        run: |
          node --test ops/scripts/lib/company-os.test.mjs ops/scripts/lib/deployment-sha.test.mjs
          node ops/scripts/check-company-os.mjs

  site:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm run audit:prod
      - run: npm run family:verify
      - run: npm run lint
      - run: npm test
      - run: npx playwright install --with-deps chromium webkit
      - run: npm run test:e2e
      - run: BROWSER=webkit npm run test:e2e

  version-single-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: bash ops/scripts/check-version-single-source.sh

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: 비밀정보 검사
        uses: docker://ghcr.io/gitleaks/gitleaks:v8.30.1
        with:
          args: git --redact --verbose --no-banner
