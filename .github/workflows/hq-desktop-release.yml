# ROBOM HQ 데스크톱 앱 릴리스 — hq-v* 태그를 push하면 진짜 macOS/Windows 러너에서
# .dmg(.zip)·.exe를 빌드해 GitHub Release에 올린다. 바이너리는 저장소에 커밋하지 않는다(§18.10).
# 서명·공증은 Apple Developer 자격정보가 등록되기 전까지 수행하지 않으며(미서명 명시),
# CSC_IDENTITY_AUTO_DISCOVERY=false로 우발적 서명 시도도 차단한다.
name: HQ Desktop Release

on:
  push:
    tags: ["hq-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "릴리스 태그 (예: hq-v1.2.0) — 지정하면 이 태그로 Release를 만들고 업로드"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: hq-desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: mac
          - os: windows-latest
            label: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: payload 준비 (본부 서버·화면·정본 미러)
        run: node desktop/scripts/prepare-payload.mjs
      - name: 의존성 설치
        working-directory: desktop
        run: npm install --no-audit --no-fund
      - name: 데스크톱 앱 빌드 (미서명)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --publish never
      - name: 산출물 확인
        shell: bash
        working-directory: desktop
        run: ls -la dist/ | grep -Ei "dmg|zip|exe" || { echo "::error::설치 파일이 생성되지 않았습니다."; exit 1; }
      - name: GitHub Release 업로드
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          TAG="${INPUT_TAG:-$GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "ROBOM HQ ${TAG#hq-}" \
            --notes "ROBOM HQ 데스크톱 앱 (미서명 빌드 — 맥: 우클릭→열기 1회 필요 / 윈도우: SmartScreen '추가 정보→실행'). 설치·사용법: docs/hq/CEO-QUICK-GUIDE.md" \
            2>/dev/null || true
          shopt -s nullglob
          files=(desktop/dist/*.dmg desktop/dist/*.zip desktop/dist/*.exe)
          if [ ${#files[@]} -eq 0 ]; then echo "::error::업로드할 파일 없음"; exit 1; fi
          gh release upload "$TAG" "${files[@]}" --clobber
