name: daily-kakao-report

# 매일 draft PR 현황을 카카오톡 "나에게 보내기"로 발송한다.
# 필요한 GitHub Secrets (사람이 직접 등록, Claude는 값에 접근하지 않음):
#   - KAKAO_CLIENT_SECRET : 카카오 디벨로퍼스 > 플랫폼 키 > 클라이언트 시크릿
#   - KAKAO_REFRESH_TOKEN : 카카오 로그인 OAuth로 발급받은 refresh_token
# REST API 키는 클라이언트 공개용 값이라 시크릿이 아니라 아래 client_id에 직접 사용.

on:
  workflow_dispatch:
    inputs:
      message:
        description: "카카오로 보낼 내용 (비우면 기본 문구로 발송)"
        required: false
        default: ""
  schedule:
    - cron: "0 23 * * *" # UTC 23:00 = KST 08:00

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: 카카오 액세스 토큰 갱신
        id: token
        env:
          CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: |
          RESPONSE=$(curl -sS -X POST "https://kauth.kakao.com/oauth/token" \
            -d "grant_type=refresh_token" \
            -d "client_id=30dbc23cb8c40f05689b66eb425539d6" \
            -d "client_secret=${CLIENT_SECRET}" \
            -d "refresh_token=${REFRESH_TOKEN}")
          ACCESS_TOKEN=$(echo "$RESPONSE" | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::카카오 토큰 갱신 실패: $RESPONSE"
            exit 1
          fi
          echo "::add-mask::$ACCESS_TOKEN"
          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"

      - name: 나에게 보내기 발송
        env:
          ACCESS_TOKEN: ${{ steps.token.outputs.access_token }}
          MSG: ${{ github.event.inputs.message }}
        run: |
          DEFAULT="[Zoop Holdings 8시 보고]
          08시는 보고 자동화 1개가 보냅니다.
          매일 일하는 팀: 제품개선 5명(CEO/기획/개발/검수/기록), 홍보 1명.
          보고 내용: 오늘 확인할 열린 PR만. 완료된 PR 번호는 제외합니다."
          TEXT="${MSG:-$DEFAULT}"
          TEMPLATE=$(jq -nc --arg t "$TEXT" '{object_type:"text",text:$t,link:{web_url:"https://github.com/runnerpyrri-lgtm/Zoop-holdings/pulls"},button_title:"열린 PR 보기"}')
          curl -sS -X POST "https://kapi.kakao.com/v2/api/talk/memo/default/send" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            --data-urlencode "template_object=${TEMPLATE}"
