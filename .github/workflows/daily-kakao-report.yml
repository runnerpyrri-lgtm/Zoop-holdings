name: daily-kakao-report

# 매일 draft PR 현황을 카카오톡 "나에게 보내기"로 발송한다.
# 필요한 GitHub Secrets (사람이 직접 등록, Claude는 값에 접근하지 않음):
#   - KAKAO_CLIENT_SECRET : 카카오 디벨로퍼스 > 플랫폼 키 > 클라이언트 시크릿
#   - KAKAO_REFRESH_TOKEN : 카카오 로그인 OAuth로 발급받은 refresh_token
# REST API 키는 클라이언트 공개용 값이라 시크릿이 아니라 아래 client_id에 직접 사용.

# 최소 권한: PR 개수 조회(read)만 필요하다.
permissions:
  contents: read
  pull-requests: read

on:
  workflow_dispatch:
    inputs:
      message:
        description: "카카오로 보낼 내용 (비우면 기본 문구로 발송)"
        required: false
        default: ""
  schedule:
    - cron: "0 23 * * *" # UTC 23:00 = KST 08:00

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: 카카오 액세스 토큰 갱신
        id: token
        env:
          CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          # 사람 작업(ops/HUMAN-TASKS.md): Settings > Secrets and variables > Actions > Variables 에
          # KAKAO_CLIENT_ID 를 등록하면 아래 하드코딩 fallback을 제거할 수 있다.
          CLIENT_ID: ${{ vars.KAKAO_CLIENT_ID || '30dbc23cb8c40f05689b66eb425539d6' }}
        run: |
          RESPONSE=$(curl -sS -X POST "https://kauth.kakao.com/oauth/token" \
            -d "grant_type=refresh_token" \
            -d "client_id=${CLIENT_ID}" \
            -d "client_secret=${CLIENT_SECRET}" \
            -d "refresh_token=${REFRESH_TOKEN}")
          ACCESS_TOKEN=$(echo "$RESPONSE" | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::카카오 토큰 갱신 실패: $RESPONSE"
            exit 1
          fi
          echo "::add-mask::$ACCESS_TOKEN"
          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"

      - name: 나에게 보내기 발송
        env:
          ACCESS_TOKEN: ${{ steps.token.outputs.access_token }}
          MSG: ${{ github.event.inputs.message }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$MSG" ]; then
            # 수동 발송: 입력한 문구 그대로
            TEXT="$MSG"
          else
            # 스케줄 자동 발송: 맨 위에 한국시간, 그 아래 진행 PR 건수(내용)
            NOW=$(TZ=Asia/Seoul date +"%p %-I시 %-M분" | sed 's/AM/오전/;s/PM/오후/')
            TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
            PRCOUNT=$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls?state=open&per_page=100" | jq 'length' 2>/dev/null || echo "?")
            TEXT=$(printf '🕒 %s 기준\n황준필 회장님, 보고드리겠습니다!\n[Zoop Holdings 일일보고 · %s]\n🟢 진행 PR %s건 (검토 대기) — 자세한 내용은 아래 버튼' "$NOW" "$TODAY" "$PRCOUNT")
          fi
          TEMPLATE=$(jq -nc --arg t "$TEXT" '{object_type:"text",text:$t,link:{web_url:"https://github.com/runnerpyrri-lgtm/Zoop-holdings/pulls"},button_title:"PR 목록 보기"}')
          curl -sS -X POST "https://kapi.kakao.com/v2/api/talk/memo/default/send" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            --data-urlencode "template_object=${TEMPLATE}"
