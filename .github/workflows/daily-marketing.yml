# 매일 홍보 콘텐츠 공장 — 오늘 앱의 다채널 콘텐츠팩을 생성해 PR로 쌓는다.
# 만드는 건 자동, 외부 게시는 사람 승인. (스팸 자동게시 금지 — playbooks/marketing-channels.md)
name: Daily Marketing

on:
  schedule:
    - cron: "30 0 * * *"     # 09:30 KST — 데일리 런 직후
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: daily-marketing
  cancel-in-progress: false

jobs:
  marketing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 15"
          prompt: |
            너는 zoop-holdings의 홍보·성장팀이다.
            .claude/agents/growth-marketer.md 와 ops/playbooks/marketing-channels.md 를 따른다.
            오늘의 콘텐츠팩:
            1) apps.yml 로 오늘 홍보할 앱 1개 선택(요일 로테이션)
            2) ops/content/<날짜>/<앱>/ 아래 채널별 초안 생성
               (youtube-shorts / instagram / blog-seo / community-replies)
            3) 각 파일 맨 위 [상태: 게시대기 / 승인자 / 채널] 헤더
            4) 절대 외부 자동 게시 금지. draft PR까지만. state 갱신.
