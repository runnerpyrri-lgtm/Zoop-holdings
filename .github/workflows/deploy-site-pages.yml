# robom 패밀리 허브를 생성물 검증·정적 프리렌더·운영 smoke와 함께 GitHub Pages에 배포한다.
name: Deploy robom site to Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "ops/registry/apps.yml"
      - "ops/family/**"
      - "ops/scripts/check-app-registry.mjs"
      - "ops/scripts/lib/**"
      - "ops/scripts/family/**"
      - ".github/workflows/deploy-site-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-site-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - name: Production dependency audit
        run: npm run audit:prod
      - name: Registry·family drift·QR decode
        run: node ../ops/scripts/check-app-registry.mjs && npm run family:verify
      - name: Build·rendered HTML 검사
        run: NEXT_PUBLIC_BUILD_SHA=${GITHUB_SHA} npm test
      - name: Chromium·WebKit 설치
        run: npx playwright install --with-deps chromium webkit
      - name: 모바일·설치 E2E Chromium
        run: NEXT_PUBLIC_BUILD_SHA=${GITHUB_SHA} npm run test:e2e
      - name: 모바일·설치 E2E WebKit
        run: NEXT_PUBLIC_BUILD_SHA=${GITHUB_SHA} BROWSER=webkit npm run test:e2e
      - name: GitHub Pages 정적 프리렌더
        run: GITHUB_SHA=${GITHUB_SHA} node scripts/prerender-static.mjs
      - name: 실패 화면 업로드
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: robom-site-e2e-screenshots
          path: site/screenshots/family-final/
          if-no-files-found: ignore
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site/dist/static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 허브·설치·QR·캘린더봄 이전·빌드 SHA 확인
        shell: bash
        run: |
          BASE="${{ needs.deploy.outputs.page_url }}"
          for attempt in 1 2 3 4 5; do
            HOME="$(curl -fsSL "${BASE}" || true)"
            INSTALL="$(curl -fsSL "${BASE}get/outbom/" || true)"
            QR="$(curl -fsSL "${BASE}install/qr/outbom.svg" || true)"
            BRIDGE="$(curl -fsSL "${BASE}calendarbom/" || true)"
            BRIDGE_SW="$(curl -fsSL "${BASE}calendarbom/sw.js" || true)"
            if grep -q "설치·휴대폰 사용" <<<"$HOME" \
              && grep -q "https://robom.kr/get/outbom" <<<"$INSTALL" \
              && grep -q "<svg" <<<"$QR" \
              && grep -q "독립 주소로 이사" <<<"$BRIDGE" \
              && grep -q "LEGACY_CACHE_PREFIX" <<<"$BRIDGE_SW" \
              && grep -q "${GITHUB_SHA::7}" <<<"$HOME"; then
              exit 0
            fi
            sleep 10
          done
          exit 1
