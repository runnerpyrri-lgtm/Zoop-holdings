# runningcall(Next.js) — apps/runningcall 가 바뀔 때만 실행.
# 배포 build 는 Vercel 담당. 여기선 typecheck + test 만.
# pnpm 10: runningcall 워크스페이스 파일이 allowBuilds(=pnpm10 문법)을 쓰므로 버전 맞춤.
name: CI · runningcall

on:
  pull_request:
    paths:
      - "apps/runningcall/**"

permissions:
  contents: read

jobs:
  typecheck-test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/runningcall } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm, cache-dependency-path: apps/runningcall/pnpm-lock.yaml }
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
