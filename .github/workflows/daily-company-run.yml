# [예비용 — 스케줄 없음] 하루 2회 운영은 유료 API 키 대신 회장 Claude 구독 기반의
# 본부장 루틴(Claude Code Remote Routine)이 수행한다(D20 — 추가 비용 0원).
# 이 워크플로는 ANTHROPIC_API_KEY를 등록한 경우에만 수동 실행(workflow_dispatch)으로 쓸 수 있다.
name: Daily Company Run

on:
  workflow_dispatch:

permissions:
  contents: write            # 데일리 브랜치 push
  pull-requests: write       # PR 생성
  issues: write              # (claude-code-action 권장)

concurrency:
  group: daily-company-run
  cancel-in-progress: false

jobs:
  company-run:
    runs-on: ubuntu-latest
    steps:
      - name: ANTHROPIC_API_KEY 등록 확인 (없으면 즉시 실패)
        env:
          HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: |
          if [ "$HAS_KEY" != "true" ]; then
            echo "::error::ANTHROPIC_API_KEY secret이 등록되어 있지 않습니다. GitHub Settings > Secrets and variables > Actions 에서 등록하세요. (사람 작업 — ops/HUMAN-TASKS.md 1번)"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # 비용 상한: 회차당 실행이 폭주하지 않게 turn 제한
          claude_args: "--max-turns 20"
          prompt: |
            너는 zoop-holdings의 본부장(오케스트레이터)이다.
            .claude/agents/ceo-orchestrator.md 규칙과 CLAUDE.md 금지작업을 그대로 따른다.
            이번 회차 데일리 런(오전 06시 / 오후 18시 KST 중 현재 시각으로 판단):
            1) 상태 점검: 세 앱 원본 저장소의 최신 package.json 버전
               (https://raw.githubusercontent.com/<repo>/main/package.json — 공개 저장소, 인증 불필요)과
               ops/registry/apps.yml · apps/ 사본 버전을 대조하고, 이 저장소의 열린 PR과
               최근 실패한 워크플로를 확인한다.
            2) 본부장 보고서 작성: ops/reports/TEMPLATE.md 틀에 맞춰
               ops/reports/<YYYY-MM-DD>-<am|pm>.md 를 생성한다.
               회장님은 비전공자다 — 전문용어 없이, 오늘 한 일 / 앱 신호등 / 승인 대기 PR /
               사람이 해야 할 일 / 다음 계획을 쉬운 한국어로 쓴다.
            3) ops 개선 딱 1건: 문서 정확화, 가드레일 보강, stale 기록 갱신 중 가장 가치 있는 것.
               ★ apps/ 사본의 앱 코드는 절대 수정하지 않는다(읽기 전용 미러 — apps/README.md 참조).
               앱 코드 개선은 각 원본 저장소의 daily-self-improve 워크플로가 담당한다(D16).
            4) 브랜치 claude/daily-<날짜>-<회차> 로 커밋하고 **draft PR**을 연다(main 직접 push 금지).
            5) PR 설명 맨 위에 보고서 요약을 붙여 회장이 PR만 봐도 이해되게 한다.
               기록 필수: ops/state·changelog 갱신.
               루트 VERSION(시스템 버전)은 회사 운영방식·자동화 변경 때만 올린다(앱 작업에선 건드리지 않는다).
