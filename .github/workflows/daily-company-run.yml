# 매일 09시(KST) 회사 운영 — 실행 4팀이 앱 1개를 개선하고 PR을 연다.
# Claude는 브랜치 push + PR 생성까지만. main merge는 사람이 한다.
name: Daily Company Run

on:
  schedule:
    - cron: "0 0 * * *"      # 00:00 UTC = 09:00 KST
  workflow_dispatch:

permissions:
  contents: write            # 데일리 브랜치 push
  pull-requests: write       # PR 생성
  issues: write              # (claude-code-action 권장)

concurrency:
  group: daily-company-run
  cancel-in-progress: false

jobs:
  company-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # 비용 상한: 하루 실행이 폭주하지 않게 turn 제한
          claude_args: "--max-turns 20"
          prompt: |
            너는 zoop-holdings의 마스터(오케스트레이터)다.
            .claude/agents/ceo-orchestrator.md 규칙과 CLAUDE.md 금지작업을 그대로 따른다.
            오늘의 데일리 런:
            1) ops/registry/apps.yml 와 ops/scorecards/app-priority.md 로 오늘 앱 1개 선택
            2) planner → builder → inspector → recorder 순으로 수행
            3) 변경은 선언한 파일 범위 안에서만. 하루 = 앱1·목표1·PR1.
            4) 위험 점수가 높으면 코드 대신 제안서 PR만 만든다.
            5) 브랜치 claude/daily-<날짜> 로 커밋하고 **draft PR**을 연다(main 직접 push 금지).
            6) PR 설명: 결과 / 테스트 / 위험 / 다음 작업. state·changelog·VERSION 갱신 필수.
