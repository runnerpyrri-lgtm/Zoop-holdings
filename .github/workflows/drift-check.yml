# 드리프트 감시 — 원본 앱 저장소(배포 소스) ↔ registry ↔ apps/ 사본의 버전이 갈라지면 실패한다.
# 원본 저장소는 공개라 인증 없이 raw.githubusercontent.com 으로 대조한다.
# 실패 = 사본 동기화 PR 또는 registry 갱신이 필요하다는 신호. (R2 방어)
name: Drift Check

on:
  schedule:
    - cron: "30 20 * * *"    # 20:30 UTC = 05:30 KST, 오전 데일리 런 직전
  workflow_dispatch:
  pull_request:
    paths:
      - "ops/registry/apps.yml"
      - "apps/*/package.json"
      - "ops/scripts/check-origin-drift.sh"

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 원본 저장소 ↔ registry ↔ vendored 버전 대조
        run: bash ops/scripts/check-origin-drift.sh
