# 주 1회(월요일 09시 KST) — 개선 엔진: 감독·개선연구·릴리즈.
name: Weekly Review

on:
  schedule:
    - cron: "0 0 * * 1"     # 매주 월요일 00:00 UTC = 09:00 KST
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - name: ANTHROPIC_API_KEY 등록 확인 (없으면 즉시 실패)
        env:
          HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: |
          if [ "$HAS_KEY" != "true" ]; then
            echo "::error::ANTHROPIC_API_KEY secret이 등록되어 있지 않습니다. GitHub Settings > Secrets and variables > Actions 에서 등록하세요. (사람 작업 — ops/HUMAN-TASKS.md 1번)"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 20"
          prompt: |
            너는 zoop-holdings의 개선 엔진이다. 순서대로 수행:
            1) supervisor: 지난주 PR 머지율/재작업률/반복 실패 분석 →
               ops/scorecards/agent-performance.md 갱신 + 고칠 agent 프롬프트 목록
            2) upgrader(R&D): 각 앱 다음 업그레이드/리팩토링 후보를 ROADMAP에 제안
            3) release-manager: 이번 주 릴리스 후보·버전·CHANGELOG 검토
            결과를 요약하고 프롬프트 수정이 있으면 draft PR을 연다.
