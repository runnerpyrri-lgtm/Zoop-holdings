name: Registry drift

on:
  push:
    branches: [main]
    paths:
      - "ops/registry/apps.yml"
      - "ops/scripts/check-app-registry.mjs"
  schedule:
    - cron: "17 21 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node ops/scripts/check-app-registry.mjs
